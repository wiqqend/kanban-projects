<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hot Takes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>

    <header>
      <div class="header-inner">
        <div class="brand">
          <h1>HOT<span class="accent">TAKES</span></h1>
          <p class="tagline">Unpopular opinions. Voted on. Judged.</p>
        </div>
        <div class="header-stats">
          <div class="stat-pill">
            <span id="total-takes">0</span> takes posted
          </div>
          <div class="stat-pill">
            <span id="total-votes">0</span> votes cast
          </div>
        </div>
      </div>
    </header>

    <main>

      <!-- Submit Form -->
      <section class="submit-section">
        <h2 class="section-label">DROP YOUR TAKE</h2>
        <form id="take-form">
          <div class="form-row">
            <input
              type="text"
              id="author-input"
              placeholder="Your name"
              maxlength="30"
              required
            />
            <select id="category-input">
              <option value="food">🍕 Food</option>
              <option value="movies">🎬 Movies</option>
              <option value="music">🎵 Music</option>
              <option value="sports">🏆 Sports</option>
              <option value="school">📚 School</option>
              <option value="life">✨ Life</option>
            </select>
          </div>
          <textarea
            id="take-input"
            placeholder="State your hot take... be bold."
            maxlength="200"
            required
          ></textarea>
          <button type="submit" class="btn-submit">POST IT 🔥</button>
        </form>
      </section>

      <!-- Board Controls -->
      <div class="board-controls">
        <h2 class="section-label">THE BOARD</h2>
        <div class="controls-right">
          <select id="filter-category">
            <option value="all">All Categories</option>
            <option value="food">🍕 Food</option>
            <option value="movies">🎬 Movies</option>
            <option value="music">🎵 Music</option>
            <option value="sports">🏆 Sports</option>
            <option value="school">📚 School</option>
            <option value="life">✨ Life</option>
          </select>
          <select id="sort-select">
            <option value="newest">Newest First</option>
            <option value="hottest">Most Votes</option>
            <option value="controversial">Most Controversial</option>
          </select>
        </div>
      </div>

      <!-- Takes Grid -->
      <div id="takes-grid"></div>

    </main>

    <script src="./script.js" defer></script>
  </body>
</html>
